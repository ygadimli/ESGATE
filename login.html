<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - ESGATE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }
        
        .auth-bg {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        
        .auth-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
        }
        
        .auth-orb-1 {
            width: 500px;
            height: 500px;
            background: #10b981;
            top: -200px;
            right: -100px;
            opacity: 0.15;
        }
        
        .auth-orb-2 {
            width: 400px;
            height: 400px;
            background: #6366f1;
            bottom: -100px;
            left: -100px;
            opacity: 0.15;
        }
        
        .auth-container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
        }
        
        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 48px;
            box-shadow: var(--shadow-lg);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .auth-logo-icon {
            font-size: 2.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .auth-logo-text {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 0.05em;
        }
        
        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .auth-subtitle {
            color: var(--text-secondary);
        }
        
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px var(--accent-green-glow);
        }
        
        .form-group input::placeholder {
            color: var(--text-muted);
        }
        
        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-green);
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .auth-btn {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 8px;
        }
        
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 32px 0;
        }
        
        .auth-divider-line {
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        
        .auth-divider-text {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .auth-link {
            text-align: center;
        }
        
        .auth-link p {
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        
        .auth-link a {
            display: block;
            padding: 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .auth-link a:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
        }
        
        .back-home {
            position: absolute;
            top: 24px;
            left: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        
        .back-home:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-bg">
            <div class="auth-orb auth-orb-1"></div>
            <div class="auth-orb auth-orb-2"></div>
        </div>
        
        <a href="/home" class="back-home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Haqqımızda
        </a>
        
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">
                        <span class="auth-logo-icon">◈</span>
                        <span class="auth-logo-text">ESGATE</span>
                    </div>
                    <h1 class="auth-title">Xoş Gəldiniz</h1>
                    <p class="auth-subtitle">Hesabınıza daxil olun</p>
                </div>
                
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="username">İstifadəçi adı</label>
                        <input type="text" id="username" name="username" placeholder="İstifadəçi adınızı daxil edin" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Şifrə</label>
                        <input type="password" id="password" name="password" placeholder="Şifrənizi daxil edin" required>
                    </div>
                    
                    <div class="form-row">
                        <label class="remember-me">
                            <input type="checkbox" id="remember" name="remember">
                            <span>Məni xatırla</span>
                        </label>
                    </div>
                    
                    <div id="errorMessage" class="error-message"></div>
                    
                    <button type="submit" class="btn btn-primary auth-btn">
                        <span>Daxil Ol</span>
                        <div class="btn-loader"></div>
                    </button>
                </form>
                
                <div class="auth-divider">
                    <div class="auth-divider-line"></div>
                    <span class="auth-divider-text">Yeni hesab yaradın</span>
                    <div class="auth-divider-line"></div>
                </div>
                
                <div style="display: flex; gap: 10px; flex-direction: column;">
                    <a href="/signup?role=enterprise" style="display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 12px; color: #10b981; font-weight: 500; transition: all 0.2s;">
                        <span style="font-size: 1.3rem;">🏢</span>
                        <div>
                            <div>Şirkət Hesabı</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">ESG skorları, ROI optimallaşdırma</div>
                        </div>
                    </a>
                    <a href="/signup?role=investor" style="display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 12px; color: #6366f1; font-weight: 500; transition: all 0.2s;">
                        <span style="font-size: 1.3rem;">💼</span>
                        <div>
                            <div>İnvestor Hesabı</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">Şirkət analizi, portfolio idarəetmə</div>
                        </div>
                    </a>
                    <a href="/signup?role=kids" style="display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 12px; color: #f59e0b; font-weight: 500; transition: all 0.2s;">
                        <span style="font-size: 1.3rem;">🎮</span>
                        <div>
                            <div>Uşaq Hesabı</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">Maliyyə savadlılığı, oyunlar</div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = this.querySelector('button[type="submit"]');
            const errorDiv = document.getElementById('errorMessage');
            
            btn.classList.add('loading');
            errorDiv.classList.remove('show');
            
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                remember: document.getElementById('remember').checked
            };
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.message || 'Giriş uğursuz oldu');
                }
                
                // Redirect based on role
                window.location.href = '/dashboard';
                
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.add('show');
            } finally {
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
